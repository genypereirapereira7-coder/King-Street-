{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>{% block title %}{{ STORE_NAME }}{% endblock %}</title>
  <link rel="manifest" href="{% url 'pwa-manifest' %}">
  <link rel="icon" href="{% static 'img/logo-cut.png' %}">
  <link rel="apple-touch-icon" href="{% static 'pwa/icon-192.png' %}">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}?v=9">
  <link rel="stylesheet" href="{% static 'css/store.css' %}?v=9">
</head>
<body>
  <div id="spa-bar"></div>
  <div id="app">
    <header class="store-header">
      <div class="container bar">
        <a href="{% url 'store:catalog' %}" class="brand">
          <img src="{% static 'img/logo-cut.png' %}" alt="{{ STORE_NAME }}" class="brand-logo" width="40" height="40">
          <span class="brand-name wm"><span class="wm-king">King</span><span class="wm-street">Street</span></span>
        </a>
        <form class="header-search" action="{% url 'store:catalog' %}" method="get">
          <input type="search" name="q" placeholder="Buscar produtos..." value="{{ request.GET.q }}">
        </form>
        <div class="header-actions">
          <a href="{% url 'store:cart' %}" class="icon-btn" aria-label="Carrinho">🛒
            {% if cart_count %}<span class="cart-count">{{ cart_count }}</span>{% endif %}
          </a>
        </div>
      </div>
    </header>

    <main class="container page-pad">
      {% if messages %}
        <div class="messages">
          {% for m in messages %}<div class="msg {{ m.tags }}">{{ m }}</div>{% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav">
      <a href="{% url 'store:catalog' %}" class="{% if request.resolver_match.url_name == 'catalog' %}active{% endif %}"><span class="ico">🔎</span>Catálogo</a>
      <a href="{% url 'store:cart' %}" class="{% if request.resolver_match.url_name == 'cart' %}active{% endif %}"><span class="ico">🛒</span>Carrinho</a>
      <a href="{% url 'store:my_orders' %}" class="{% if request.resolver_match.url_name == 'my_orders' %}active{% endif %}"><span class="ico">📦</span>Pedidos</a>
    </nav>

    {% block scripts %}{% endblock %}
  </div>

  <script src="{% static 'js/store.js' %}?v=9"></script>
</body>
</html>
