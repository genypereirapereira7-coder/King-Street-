{% load store_extras %}
<a href="{% url 'store:product_detail' product.slug %}" class="product-card">
  <div class="product-thumb">
    {% if product.main_image %}
      <img src="{{ product.main_image.image.url }}" alt="{{ product.name }}" loading="lazy">
    {% else %}
      <span class="placeholder">👑</span>
    {% endif %}
  </div>
  <div class="product-info">
    <div class="product-cat">{{ product.category.name }}</div>
    <div class="product-name">{{ product.name }}</div>
    <div class="product-price">{{ product.price|brl }}</div>
  </div>
</a>
